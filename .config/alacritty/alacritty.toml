# ~/.config/alacritty/alacritty.toml
# ----------------------------------------------------------

[colors]
# monokai {{{
[colors.primary]
background = "#272822"
foreground = "#f8f8f2"

[colors.normal]
black = "#272822"
red = "#f92672"
green = "#a6e22e"
yellow = "#f4bf75"
blue = "#66d9ef"
magenta = "#ae81ff"
cyan = "#a1efe4"
white = "#f8f8f2"

[colors.bright]
black = "#75715e"
red = "#f92672"
green = "#a6e22e"
yellow = "#f4bf75"
blue = "#66d9ef"
magenta = "#ae81ff"
cyan = "#a1efe4"
white = "#f9f8f5"
# }}}

[font]
size = 13.0
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }

[scrolling]
history = 10000
multiplier = 5

[window]
decorations = "None"  # "Full" | "None"
startup_mode = "Maximized"  # "Windowed" | "Maximized" | "Fullscreen" | "SimpleFullscreen"(macOS only)
